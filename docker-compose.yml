services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: springboot-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JAVA_OPTS: "-Xms256m -Xmx512m"
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # =============================================================
  # Stage de testes + coverage (não sobe servidor, só valida)
  # =============================================================
  test:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: springboot-test
    volumes:
      - ./target/surefire-reports:/app/target/surefire-reports
      - ./target/site/jacoco:/app/target/site/jacoco
    networks:
      - app-network
    profiles:
      - test

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data: